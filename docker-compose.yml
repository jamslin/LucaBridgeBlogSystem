# LucaBridge — single-box stack, selected via profiles:
#
#   docker compose up -d                          → dev deps only (postgres + minio);
#                                                   run backend/frontend on the host for hot reload
#   docker compose --profile app up -d --build    → full prod-shaped stack behind nginx :80
#   docker compose --profile monitoring up -d     → prometheus :9090 + grafana :3001
#
# Profiles combine: --profile app --profile monitoring = everything.

services:
  postgres:
    image: postgres:16-alpine
    container_name: lucabridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lucabridge
      POSTGRES_USER: lucabridge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lucabridge}
    ports:
      - "5432:5432"
    volumes:
      - lucabridge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucabridge -d lucabridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lucabridge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - lucabridge-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- profile: app (prod-shaped full stack) ----------

  backend:
    profiles: ["app"]
    build: ./backend
    container_name: lucabridge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}   # set SPRING_PROFILE=prod on the real server
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-lucabridge}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:9000}
      STORAGE_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-}
      APP_ADMIN_PASSWORD_HASH: ${APP_ADMIN_PASSWORD_HASH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    profiles: ["app"]
    build: ./frontend
    container_name: lucabridge-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:8080
      SITE_ORIGIN: ${SITE_ORIGIN:-http://localhost}

  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    container_name: lucabridge-nginx
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # ---------- profile: monitoring ----------

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: lucabridge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lucabridge-prometheus-data:/prometheus

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: lucabridge-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - lucabridge-grafana-data:/var/lib/grafana

volumes:
  lucabridge-postgres-data:
  lucabridge-minio-data:
  lucabridge-prometheus-data:
  lucabridge-grafana-data:
