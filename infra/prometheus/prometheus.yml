global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot metrics via Micrometer (JVM, HTTP server, Hikari pool, logback…)
  - job_name: lucabridge-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
