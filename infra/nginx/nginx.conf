# Reverse proxy — the only container exposed to the outside world in prod.
# SSR pages come from the Node frontend; /api goes to Spring Boot.
# /actuator is deliberately NOT proxied: metrics stay on the internal network.

worker_processes auto;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Micro-cache for SSR HTML: absorbs bursts (e.g. a shared link going viral)
    # while keeping content at most 60s stale. POST/admin traffic is never cached.
    proxy_cache_path /var/cache/nginx/ssr levels=1:2 keys_zone=ssr:10m max_size=100m inactive=10m;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # API — pass through, never cached here
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 12m;   # matches spring.servlet.multipart
        }

        # Static assets from the SSR build — long cache, content-hashed filenames
        location /assets/ {
            proxy_pass http://frontend;
            proxy_cache ssr;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # SSR pages
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache ssr;
            proxy_cache_valid 200 60s;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
