# Lightweight PR/push test gate. Deployment is Jenkins' job (see Jenkinsfile) —
# this workflow only proves the code builds and tests pass.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Maven / Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      # Testcontainers spins up its own Postgres via the runner's Docker daemon.
      - name: Build & test
        working-directory: backend
        run: ./mvnw -B verify

  frontend:
    name: Frontend (React Router SSR / npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build (SSR bundle)
        working-directory: frontend
        run: npm run build
